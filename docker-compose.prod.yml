services:
  web:
    build: .
    container_name: swcshowcase-web
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Main domain
      - "traefik.http.routers.swcshowcase.rule=Host(`swcshowcase.com`)"
      - "traefik.http.routers.swcshowcase.entrypoints=websecure"
      - "traefik.http.routers.swcshowcase.tls=true"
      - "traefik.http.routers.swcshowcase.tls.certresolver=letsencrypt"
      - "traefik.http.services.swcshowcase.loadbalancer.server.port=80"
      # WWW redirect
      - "traefik.http.routers.swcshowcase-www.rule=Host(`www.swcshowcase.com`)"
      - "traefik.http.routers.swcshowcase-www.entrypoints=websecure"
      - "traefik.http.routers.swcshowcase-www.tls=true"
      - "traefik.http.routers.swcshowcase-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.swcshowcase-www.middlewares=swcshowcase-www-redirect"
      - "traefik.http.middlewares.swcshowcase-www-redirect.redirectregex.regex=^https?://www\\.swcshowcase\\.com/(.*)"
      - "traefik.http.middlewares.swcshowcase-www-redirect.redirectregex.replacement=https://swcshowcase.com/$${1}"
      - "traefik.http.middlewares.swcshowcase-www-redirect.redirectregex.permanent=true"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
